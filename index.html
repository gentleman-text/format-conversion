<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>隱私圖片轉換器 | PNG 轉 JPG | 100% 本地處理不留痕跡</title>
    <meta name="description" content="最安全的線上圖片轉換工具。所有 PNG 轉 JPG 程序均在您的瀏覽器本地完成，檔案絕不離開您的裝置，完全斷網亦可使用。支援批次轉換與 ZIP 打包下載。">
    <meta name="keywords" content="PNG轉JPG, 圖片轉換, 隱私保護, 本地處理, 免費工具, 批次轉換, 檔案安全">
    <meta name="author" content="Gentleman-Text">
    
    <meta name="theme-color" content="#4A90E2">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root {
            --primary: #4A90E2;
            --primary-hover: #357ABD;
            --danger: #e53935;
            --success: #2e7d32;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #333333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .badge {
            background: #e8f5e9;
            color: var(--success);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        .sandbox {
            border: 2px dashed #d1d9e6;
            background: #fafcfe;
            padding: 30px 15px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .sandbox:active { border-color: var(--primary); background: #f0f7ff; }
        
        input[type="file"] { width: 100%; margin-top: 10px; }

        .status-msg {
            margin: 20px 0;
            padding: 12px;
            border-radius: 10px;
            background: #fff9e6;
            color: #856404;
            font-size: 13px;
            display: none;
            line-height: 1.5;
            border-left: 4px solid #ffc107;
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        
        button {
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.98); opacity: 0.9; }

        .btn-main { background: var(--primary); color: white; }
        .btn-outline { background: #f0f2f5; color: #555; }
        .btn-danger { background: var(--danger); color: white; margin-top: 30px; }

        .file-list {
            margin-top: 15px;
            border: 1px solid #eee;
            border-radius: 10px;
            display: none;
            max-height: 200px;
            overflow-y: auto;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        .file-item:last-child { border-bottom: none; }
        .file-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; }
        .download-icon { text-decoration: none; font-size: 18px; }

        @media (min-width: 480px) {
            .btn-row { flex-direction: row; }
            .btn-row button { flex: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <nav style="margin-bottom: 20px; font-size: 14px;">
        <a href="index.html" style="color: var(--primary); text-decoration: none;">← 返回首頁</a>
    </nav>

    <div class="header">
        <div class="badge">🔒 本地加密處理環境</div>
        <h2 style="margin:5px 0;">PNG 轉 JPG</h2>
        <p style="font-size:14px; color:#777;">您的隱私是我們的首要任務</p>
    </div>

    <div class="sandbox" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept="image/png" multiple style="display: none;">
        <p style="font-size:15px; color:var(--primary); font-weight:bold;">點擊上傳 PNG 檔案</p>
        <p style="font-size:12px; color:#999; margin-top:5px;">支援多選，檔案絕不離開此設備</p>
    </div>

    <div id="status" class="status-msg"></div>

    <div class="btn-group">
        <button id="convertBtn" class="btn-main">🚀 開始轉換</button>
        
        <div id="resultBtns" style="display: none;" class="btn-group">
            <div style="display:flex; gap: 10px;">
                <button id="zipBtn" class="btn-main" style="flex: 2;">📦 打包下載 ZIP</button>
                <button id="toggleList" class="btn-outline" style="flex: 1;">🔍 明細</button>
            </div>
        </div>
    </div>

    <div id="fileList" class="file-list"></div>
    <button id="clearBtn" class="btn-danger" style="display:none;">🗑️ 銷毀暫存並重新開始</button>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const convertBtn = document.getElementById('convertBtn');
    const status = document.getElementById('status');
    const resultBtns = document.getElementById('resultBtns');
    const fileList = document.getElementById('fileList');
    const zipBtn = document.getElementById('zipBtn');
    const toggleList = document.getElementById('toggleList');
    const clearBtn = document.getElementById('clearBtn');

    let processedFiles = [];

    convertBtn.addEventListener('click', async () => {
        const files = fileInput.files;
        if (files.length === 0) return alert("請先選擇圖片");

        status.style.display = 'block';
        resultBtns.style.display = 'none';
        fileList.style.display = 'none';
        fileList.innerHTML = '';
        processedFiles = [];

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            status.innerHTML = `⚙️ 正在本地處理 (${i + 1}/${files.length}): <br><strong>${file.name}</strong><br>
                                <small>此工具為本地加載及轉換，耗時因設備而異...</small>`;
            
            try {
                const jpgBlob = await convertImage(file);
                const newName = file.name.replace(/\.[^/.]+$/, "") + ".jpg";
                processedFiles.push({ name: newName, blob: jpgBlob });
                addToListUI(newName, jpgBlob);
            } catch (err) {
                console.error("轉換失敗:", file.name);
            }
        }

        status.innerHTML = "✅ 轉換完成！所有程序均在本地執行，您可以安心下載。";
        resultBtns.style.display = 'flex';
        clearBtn.style.display = 'block';
    });

    function convertImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = "#FFFFFF";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.9);
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    function addToListUI(name, blob) {
        const url = URL.createObjectURL(blob);
        const div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = `<span class="file-name">${name}</span><a href="${url}" download="${name}" class="download-icon">📥</a>`;
        fileList.appendChild(div);
    }

    zipBtn.addEventListener('click', async () => {
        const zip = new JSZip();
        processedFiles.forEach(f => zip.file(f.name, f.blob));
        const zipContent = await zip.generateAsync({type: "blob"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(zipContent);
        link.download = "privacy_images.zip";
        link.click();
    });

    toggleList.addEventListener('click', () => {
        fileList.style.display = (fileList.style.display === 'none' || fileList.style.display === '') ? 'block' : 'none';
    });

    clearBtn.addEventListener('click', () => {
        if(confirm("確定要銷毀所有記憶體暫存嗎？")) location.reload(); 
    });
</script>
</body>
</html>
